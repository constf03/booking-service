<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.orange.min.css"
    />
    <script
      src="https://unpkg.com/just-validate@latest/dist/just-validate.production.min.js"
      defer
    ></script>
    <script src="./script.js" defer></script>
    <title>Register - Booking Service</title>
  </head>
  <body>
    <header></header>

    <main class="container">
      <section>
        <h1>Register</h1>
        <form id="register-form" action="../src/register.php" method="post">
          <div>
            <label for="name">Name</label>
            <input type="text" id="name" name="name" />
          </div>

          <div>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" />
          </div>

          <div>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" />
          </div>

          <div>
            <label for="password-confirm">Retype Password</label>
            <input
              type="password"
              id="password-confirm"
              name="password-confirm"
            />
          </div>

          <button>Register</button>
        </form>
      </section>
    </main>

    <footer></footer>
  </body>
</html>
